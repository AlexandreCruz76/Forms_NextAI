<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questionário de Automação - Empresa de Transporte</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #1F4788 0%, #2E75B6 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .content {
            padding: 40px;
        }
        
        .section {
            margin-bottom: 40px;
            display: none;
        }
        
        .section.active {
            display: block;
        }
        
        .section-title {
            background: #f5f5f5;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            color: #1F4788;
            margin-bottom: 25px;
            border-left: 4px solid #2E75B6;
        }
        
        .question-group {
            margin-bottom: 25px;
        }
        
        .question-label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="number"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="number"]:focus,
        input[type="date"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #2E75B6;
            box-shadow: 0 0 0 3px rgba(46, 117, 182, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .checkbox-group,
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .checkbox-item,
        .radio-item {
            display: flex;
            align-items: center;
        }
        
        input[type="checkbox"],
        input[type="radio"] {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            cursor: pointer;
            accent-color: #2E75B6;
        }
        
        .checkbox-item label,
        .radio-item label {
            cursor: pointer;
            font-size: 14px;
            color: #333;
        }
        
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 40px;
            border-top: 1px solid #eee;
            background: #fafafa;
        }
        
        button {
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-prev {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-prev:hover:not(:disabled) {
            background: #e0e0e0;
        }
        
        .btn-next,
        .btn-submit {
            background: #2E75B6;
            color: white;
        }
        
        .btn-next:hover:not(:disabled),
        .btn-submit:hover:not(:disabled) {
            background: #1F4788;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 117, 182, 0.4);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .progress {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .progress-item {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ddd;
            transition: all 0.3s;
        }
        
        .progress-item.active {
            background: #2E75B6;
            transform: scale(1.5);
        }
        
        .section-counter {
            font-size: 12px;
            color: #666;
        }
        
        .success-message {
            display: none;
            background: #e8f5e9;
            border: 2px solid #4caf50;
            color: #2e7d32;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .success-message h2 {
            margin-bottom: 10px;
        }
        
        .spinner {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner.loading {
            display: block;
        }
        
        .spinner::after {
            content: "";
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2E75B6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }
            
            .header {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 22px;
            }
            
            .navigation {
                flex-direction: column;
                gap: 10px;
                padding: 20px;
            }
            
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

        <div class="navigation">

            <button class="btn-next" id="nextBtn" onclick="nextSection()">Próximo →</button>

                    { id: "q70", label: "Qual é o maior risco de não-conformidade?", type: "textarea" },

                questions: [
                    { id: "q74", label: "Liste TODOS os sistemas/ferramentas que usam:", type: "textarea" },
                    { id: "q75", label: "Qual é o sistema principal?", type: "text" },
                    { id: "q76", label: "Sistema principal tem API/webhooks?", type: "radio", options: ["Sim", "Não", "Não sabe"] },

        let currentSectionIndex = 0;

        function initForm() {
            const formContent = document.getElementById('formContent');
            
            sections.forEach((section, index) => {
                const sectionDiv = document.createElement('div');
                sectionDiv.className = `section ${index === 0 ? 'active' : ''}`;
                sectionDiv.id = `section${index}`;
                
                let html = `<h2 class="section-title">${section.title}</h2>`;
                
                section.questions.forEach(q => {
                    html += createQuestion(q);
                });
                
                sectionDiv.innerHTML = html;
                formContent.appendChild(sectionDiv);
            });
            
            updateProgressBar();
            document.getElementById('totalSections').textContent = sections.length;
        }

        function createQuestion(q) {
            let html = `<div class="question-group">`;
            html += `<label class="question-label">${q.label}</label>`;
            
            switch(q.type) {
                case 'text':
                case 'email':
                case 'number':
                case 'date':
                    html += `<input type="${q.type}" id="${q.id}" placeholder="Responda aqui...">`;
                    break;
                case 'textarea':
                    html += `<textarea id="${q.id}" placeholder="Descreva com detalhes..."></textarea>`;
                    break;
                case 'radio':
                    html += `<div class="radio-group">`;
                    q.options.forEach(opt => {
                        html += `<div class="radio-item"><input type="radio" id="${q.id}_${opt}" name="${q.id}" value="${opt}"><label for="${q.id}_${opt}">${opt}</label></div>`;
                    });
                    html += `</div>`;
                    break;
                case 'checkbox':
                    html += `<div class="checkbox-group">`;
                    q.options.forEach(opt => {
                        html += `<div class="checkbox-item"><input type="checkbox" id="${q.id}_${opt}" name="${q.id}" value="${opt}"><label for="${q.id}_${opt}">${opt}</label></div>`;
                    });
                    html += `</div>`;
                    break;
            }
            
            html += `</div>`;
            return html;
        }

        function updateProgressBar() {
            const progressBar = document.getElementById('progressBar');
            progressBar.innerHTML = '';
            for (let i = 0; i < sections.length; i++) {
                const dot = document.createElement('div');
                dot.className = `progress-item ${i === currentSectionIndex ? 'active' : ''}`;
                progressBar.appendChild(dot);
            }
        }

        function nextSection() {
            if (currentSectionIndex < sections.length - 1) {
                document.getElementById(`section${currentSectionIndex}`).classList.remove('active');
                currentSectionIndex++;
                document.getElementById(`section${currentSectionIndex}`).classList.add('active');
                updateButtons();
                updateProgressBar();
                document.getElementById('currentSection').textContent = currentSectionIndex + 1;
                window.scrollTo(0, 0);
            } else {
                submitForm();
            }
        }

        function previousSection() {
            if (currentSectionIndex > 0) {
                document.getElementById(`section${currentSectionIndex}`).classList.remove('active');
                currentSectionIndex--;
                document.getElementById(`section${currentSectionIndex}`).classList.add('active');
                updateButtons();
                updateProgressBar();
                document.getElementById('currentSection').textContent = currentSectionIndex + 1;
                window.scrollTo(0, 0);
            }
        }

        function updateButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            prevBtn.disabled = currentSectionIndex === 0;
            
            if (currentSectionIndex === sections.length - 1) {
                nextBtn.textContent = 'Enviar ✓';
                nextBtn.className = 'btn-submit';
            } else {
                nextBtn.textContent = 'Próximo →';
                nextBtn.className = 'btn-next';
            }
        }

        function submitForm() {
            const formData = new FormData();
            const responses = {};
            
            sections.forEach(section => {
                section.questions.forEach(q => {
                    const element = document.getElementById(q.id);
                    if (element) {
                        if (q.type === 'radio') {
                            const checked = document.querySelector(`input[name="${q.id}"]:checked`);
                            responses[q.id] = checked ? checked.value : '';
                        } else if (q.type === 'checkbox') {
                            const checked = Array.from(document.querySelectorAll(`input[name="${q.id}"]:checked`))
                                .map(el => el.value);
                            responses[q.id] = checked.join(', ');
                        } else {
                            responses[q.id] = element.value;
                        }
                    }
                });
            });
            
            // Enviar para Google Sheets ou servidor
            const jsonData = JSON.stringify(responses);
            
            // Log para debug
            console.log('Respostas:', responses);
            
            // Mostrar mensagem de sucesso
            showSuccessMessage();
        }

        function showSuccessMessage() {
            document.querySelector('.content').innerHTML = `
                <div class="success-message">
                    <h2>✓ Formulário Enviado com Sucesso!</h2>
                    <p>Obrigado por responder este questionário de forma tão detalhada.</p>
                    <p>Suas respostas serão analisadas e entraremos em contato em breve.</p>
                    <p style="margin-top: 20px; font-size: 12px;">Email de confirmação: Verifique seu email</p>
                </div>
            `;
        }

        // Inicializar formulário
        document.addEventListener('DOMContentLoaded', function() {
            initForm();
            updateButtons();
        });
    </script>
</body>
</html>
