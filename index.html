<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questionário de Automação - Empresa de Transporte</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #1F4788 0%, #2E75B6 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .content {
            padding: 40px;
        }
        
        .section {
            margin-bottom: 40px;
            display: none;
        }
        
        .section.active {
            display: block;
        }
        
        .section-title {
            background: #f5f5f5;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            color: #1F4788;
            margin-bottom: 25px;
            border-left: 4px solid #2E75B6;
        }
        
        .question-group {
            margin-bottom: 25px;
        }
        
        .question-label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="number"],
        input[type="date"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="number"]:focus,
        input[type="date"]:focus,
        input[type="tel"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #2E75B6;
            box-shadow: 0 0 0 3px rgba(46, 117, 182, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .checkbox-group,
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .checkbox-item,
        .radio-item {
            display: flex;
            align-items: center;
        }
        
        input[type="checkbox"],
        input[type="radio"] {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            cursor: pointer;
            accent-color: #2E75B6;
        }
        
        .checkbox-item label,
        .radio-item label {
            cursor: pointer;
            font-size: 14px;
            color: #333;
        }
        
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 40px;
            border-top: 1px solid #eee;
            background: #fafafa;
            gap: 20px;
        }
        
        button {
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-prev {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-prev:hover:not(:disabled) {
            background: #e0e0e0;
        }
        
        .btn-next,
        .btn-submit {
            background: #2E75B6;
            color: white;
        }
        
        .btn-next:hover:not(:disabled),
        .btn-submit:hover:not(:disabled) {
            background: #1F4788;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 117, 182, 0.4);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .progress {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .progress-item {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ddd;
            transition: all 0.3s;
        }
        
        .progress-item.active {
            background: #2E75B6;
            transform: scale(1.5);
        }
        
        .section-counter {
            font-size: 12px;
            color: #666;
            white-space: nowrap;
        }
        
        .success-message {
            display: none;
            background: #e8f5e9;
            border: 2px solid #4caf50;
            color: #2e7d32;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .success-message h2 {
            margin-bottom: 10px;
        }
        
        .error-message {
            display: none;
            background: #ffebee;
            border: 2px solid #f44336;
            color: #c62828;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading.show {
            display: block;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }
            
            .header {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 22px;
            }
            
            .navigation {
                flex-direction: column;
                gap: 10px;
                padding: 20px;
            }
            
            button {
                width: 100%;
            }
            
            .progress {
                order: -1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Questionário de Automação</h1>
            <p>Diagnóstico de Oportunidades de RPA + IA para Empresa de Transporte</p>
        </div>
        
        <div class="content" id="formContent">
            <form name="formulario-automacao" method="POST" netlify netlify-honeypot="bot-field" id="questionForm">
                <!-- Campo anti-bot (honeypot) -->
                <input type="hidden" name="bot-field">
                
                <div id="sectionsContainer"></div>
                
                <!-- Campo hidden para enviar dados -->
                <input type="hidden" name="form-name" value="formulario-automacao">
            </form>
        </div>
        
        <div class="navigation">
            <button class="btn-prev" id="prevBtn" onclick="previousSection()" disabled>← Anterior</button>
            <div class="progress" id="progressBar"></div>
            <div class="section-counter"><span id="currentSection">1</span>/<span id="totalSections">10</span></div>
            <button class="btn-next" id="nextBtn" onclick="nextSection()">Próximo →</button>
        </div>
    </div>

                    { id: "perc_clientes_atraso", label: "% clientes com atraso >30 dias?", name: "perc_clientes_atraso", type: "number" },
                    { id: "valor_total_atraso", label: "Valor total em atraso (R$)?", name: "valor_total_atraso", type: "number" },
                    { id: "cobranca_atual", label: "Como fazem cobrança atualmente?", name: "cobranca_atual", type: "radio", options: ["Email automático", "Manual telefone/WhatsApp", "Combinação", "Sem processo"] },
                    { id: "auditoria_regularidade", label: "Realizam auditoria interna?", name: "auditoria_regularidade", type: "radio", options: ["Mensal", "Trimestral", "Anual", "Não"] }
                ]
            },
            {
                title: "SEÇÃO 10: PRIORIZAÇÃO & CONTATO",
                questions: [
                    { id: "oportunidade_1", label: "Qual oportunidade automatizar PRIMEIRO (maior ROI)?", name: "oportunidade_1", type: "text" },
                    { id: "economia_1", label: "Economia estimada 1º lugar (R$)?", name: "economia_1", type: "number" },
                    { id: "oportunidade_2", label: "Qual seria 2º lugar?", name: "oportunidade_2", type: "text" },
                    { id: "economia_2", label: "Economia estimada 2º lugar (R$)?", name: "economia_2", type: "number" },
                    { id: "oportunidade_3", label: "Qual seria 3º lugar?", name: "oportunidade_3", type: "text" },
                    { id: "economia_3", label: "Economia estimada 3º lugar (R$)?", name: "economia_3", type: "number" },
                    { id: "orcamento", label: "Orçamento disponível (R$)?", name: "orcamento", type: "number" },
                    { id: "prazo_implementacao", label: "Prazo máximo para implementação?", name: "prazo_implementacao", type: "radio", options: ["3 meses", "6 meses", "12 meses", "Sem prazo"] },
                    { id: "roi_maximo", label: "ROI máximo aceitável?", name: "roi_maximo", type: "radio", options: ["3 meses", "6 meses", "12 meses", "Sem limite"] },
                    { id: "nome_gerente", label: "Nome completo do Gerente Administrativo:", name: "nome_gerente", type: "text", required: true },
                    { id: "email_gerente", label: "Email:", name: "email_gerente", type: "email", required: true },
                    { id: "telefone_gerente", label: "Telefone comercial:", name: "telefone_gerente", type: "tel", required: true },
                    { id: "whatsapp_gerente", label: "WhatsApp:", name: "whatsapp_gerente", type: "tel" },
                    { id: "melhor_horario", label: "Melhor hora para contato?", name: "melhor_horario", type: "radio", options: ["08:00-10:00", "10:00-12:00", "14:00-16:00", "16:00-18:00", "Flexível"] },
                    { id: "data_preenchimento", label: "Data de preenchimento:", name: "data_preenchimento", type: "date", required: true },
                    { id: "observacoes", label: "Observações adicionais:", name: "observacoes", type: "textarea" }
                ]
            }
        ];

        let currentSectionIndex = 0;

        function initForm() {
            const sectionsContainer = document.getElementById('sectionsContainer');
            const form = document.getElementById('questionForm');
            
            sections.forEach((section, index) => {
                const sectionDiv = document.createElement('div');
                sectionDiv.className = `section ${index === 0 ? 'active' : ''}`;
                sectionDiv.id = `section${index}`;
                
                let html = `<h2 class="section-title">${section.title}</h2>`;
                
                section.questions.forEach(q => {
                    html += createQuestion(q);
                });
                
                sectionDiv.innerHTML = html;
                sectionsContainer.appendChild(sectionDiv);
            });
            
            updateProgressBar();
            document.getElementById('totalSections').textContent = sections.length;
        }

        function createQuestion(q) {
            let html = `<div class="question-group">`;
            html += `<label class="question-label">${q.label} ${q.required ? '<span style="color:red;">*</span>' : ''}</label>`;
            
            switch(q.type) {
                case 'text':
                case 'email':
                case 'number':
                case 'date':
                case 'tel':
                    const required = q.required ? 'required' : '';
                    html += `<input type="${q.type}" name="${q.name}" placeholder="Responda aqui..." ${required}>`;
                    break;
                case 'textarea':
                    const requiredTA = q.required ? 'required' : '';
                    html += `<textarea name="${q.name}" placeholder="Descreva com detalhes..." ${requiredTA}></textarea>`;
                    break;
                case 'radio':
                    html += `<div class="radio-group">`;
                    q.options.forEach(opt => {
                        html += `<div class="radio-item"><input type="radio" name="${q.name}" value="${opt}"><label>${opt}</label></div>`;
                    });
                    html += `</div>`;
                    break;
                case 'checkbox':
                    html += `<div class="checkbox-group">`;
                    q.options.forEach(opt => {
                        html += `<div class="checkbox-item"><input type="checkbox" name="${q.name}" value="${opt}"><label>${opt}</label></div>`;
                    });
                    html += `</div>`;
                    break;
            }
            
            html += `</div>`;
            return html;
        }

        function updateProgressBar() {
            const progressBar = document.getElementById('progressBar');
            progressBar.innerHTML = '';
            for (let i = 0; i < sections.length; i++) {
                const dot = document.createElement('div');
                dot.className = `progress-item ${i === currentSectionIndex ? 'active' : ''}`;
                progressBar.appendChild(dot);
            }
        }

        function nextSection() {
            if (currentSectionIndex < sections.length - 1) {
                document.getElementById(`section${currentSectionIndex}`).classList.remove('active');
                currentSectionIndex++;
                document.getElementById(`section${currentSectionIndex}`).classList.add('active');
                updateButtons();
                updateProgressBar();
                document.getElementById('currentSection').textContent = currentSectionIndex + 1;
                window.scrollTo(0, 0);
            } else {
                submitForm();
            }
        }

        function previousSection() {
            if (currentSectionIndex > 0) {
                document.getElementById(`section${currentSectionIndex}`).classList.remove('active');
                currentSectionIndex--;
                document.getElementById(`section${currentSectionIndex}`).classList.add('active');
                updateButtons();
                updateProgressBar();
                document.getElementById('currentSection').textContent = currentSectionIndex + 1;
                window.scrollTo(0, 0);
            }
        }

        function updateButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            prevBtn.disabled = currentSectionIndex === 0;
            
            if (currentSectionIndex === sections.length - 1) {
                nextBtn.textContent = 'Enviar ✓';
                nextBtn.className = 'btn-submit';
            } else {
                nextBtn.textContent = 'Próximo →';
                nextBtn.className = 'btn-next';
            }
        }

        function submitForm() {
            const form = document.getElementById('questionForm');
            
            // Validar campos obrigatórios
            const requiredFields = form.querySelectorAll('[required]');
            let isValid = true;
            
            requiredFields.forEach(field => {
                if (!field.value.trim()) {
                    isValid = false;
                    field.style.borderColor = '#f44336';
                }
            });
            
            if (!isValid) {
                alert('Por favor, preencha todos os campos obrigatórios (marcados com *)');
                return;
            }
            
            // Enviar formulário para Netlify
            const formData = new FormData(form);
            
            fetch('/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams(formData).toString()
            })
            .then(() => {
                showSuccessMessage();
            })
            .catch(error => {
                console.error('Erro ao enviar:', error);
                alert('Erro ao enviar formulário. Tente novamente.');
            });
        }

        function showSuccessMessage() {
            document.getElementById('formContent').innerHTML = `
                <div class="success-message" style="display: block;">
                    <h2>✓ Formulário Enviado com Sucesso!</h2>
                    <p>Obrigado por responder este questionário de forma tão detalhada.</p>
                    <p>Suas respostas serão analisadas e entraremos em contato em breve.</p>
                    <p style="margin-top: 20px; font-size: 12px;">
                        Verifique seu email para confirmação.<br>
                        Contato: support@nexusai.com.br
                    </p>
                </div>
            `;
            document.querySelector('.navigation').style.display = 'none';
        }

        // Inicializar formulário
        document.addEventListener('DOMContentLoaded', function() {
            initForm();
            updateButtons();
        });
    </script>
</body>
</html>
